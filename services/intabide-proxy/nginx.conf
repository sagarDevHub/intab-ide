events { 
    worker_connections 1024; 
}

http {
    upstream ai_service {
        server ai-service:5001;
    }

    map $http_user_agent $is_banned_bot {
        default             0;
        ~*headlesschromewp  1;
        ~*selenium          1;
        ~*playwright        1;
        ~*puppeteer         1;
        ~*python-requests   1;
        ~*curl              1;
        ~*wget              1;
        ~*postmanruntime    1;
    }

    server {
        listen 80;

        if ($is_banned_bot) {
            return 403 '{"error": "Automated script traffic blocked by gatekeeper"}';
        }

        location /api/ai/ {
            proxy_pass http://ai_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /health {
            return 200 '{"status": "Proxy gatekeeper is active"}';
            add_header Content-Type application/json;
        }
    }
}